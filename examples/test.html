		<script type="text/javascript">
$(document).ready(function () {
	MIE.DEBUGGING = true;
	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: 'random-10000.json'
	});
	var view = new MIE.WC_DataVis.View(source, 'Test View', {
		saveViewConfig: false
	});

	var sortInfo = [
		['string1', '-a', 'zymolysis', 'random dictionary word'],
		['int1', 1, 9999, 'integer (number → number)'],
		['int2', '0', '9999', 'integer (string → number)'],
		['int3', '0', '9,996', 'integer (string → numeral)'],
		['float1', 3.061266484315311, 9998.333795736264, 'float (number → number)'],
		['float2', '0.1223883580972307', '9998.556759920326', 'float (string → number)'],
		['float3', '2.896', '9,997.629', 'float (string → numeral)'],
		['currency1', 1.34, 9998.03, 'currency (number : currency → number)'],
		['currency2', '1.64', '9,997.38', 'currency (string : currency → number)'],
		['currency3', '$1.42', '$9,998.74', 'currency (string : currency → numeral)'],
		['currency4', '$1.40', '$9,997.55', 'currency (string : string → numeral)'],
		['date1', '1900-01-23', '2099-12-19', 'date (string → string)'],
		['date2', 'Jan 6, 1900', 'Dec 21, 2099', 'date (string → moment)'],
		['date3', '01/01/70', '12/31/09', 'date (string → moment)']
	];

	QUnit.test('Sort Test', function (assert) {
		var done = assert.async();
		(function (args, fun, done) {
			function g() {
				if (args.length === 0) {
					return done();
				}
				fun(args.shift(), g);
			};
			g();
		})(sortInfo, function (si, next) {
			var [field, min, max, info] = si;
			view.reset();
			view.setSort({ vertical: { field: field, dir: 'ASC' }}, {
				updateData: false
			});
			view.getData(function (data) {
				var cell = data.data[0].rowData[field];
				assert.equal(cell.orig || cell.value, min, info);
				view.reset();
				view.setSort({ vertical: { field: field, dir: 'DESC' }});
				view.getData(function (data) {
					var cell = data.data[0].rowData[field];
					assert.equal(cell.orig || cell.value, max, info);
					return next();
				});
			});
		}, done);
	});

	var groupInfo = [
		[['country'], 10, [
			['United States'], 1000,
			['Canada'], 1000,
			['Mexico'], 1000,
			['England'], 1000,
			['France'], 1000,
			['Germany'], 1000,
			['Switzerland'], 1000,
			['Japan'], 1000,
			['China'], 1000,
			['South Korea'], 1000
		]]
	];

	QUnit.test('Group Test', function (assert) {
		var done = assert.async();
		(function (args, fun, done) {
			function g() {
				if (args.length === 0) {
					return done();
				}
				fun(args.shift(), g);
			};
			g();
		})(groupInfo, function (gi, next) {
			var [fields, numGroups, result] = gi;
			view.reset();
			view.setGroup({ fieldNames: fields }, {
				updateData: false
			});
			view.getData(function (data) {
				var tag = JSON.stringify(fields);
				assert.deepEqual(data.groupFields, fields, tag + ': group fields');
				for (var i = 0; i < result.length; i += 2) {
					var rowVal = result[i];
					var len = result[i + 1];
					var tag2 = tag + ' - ' + JSON.stringify(rowVal);
					var rowValIndex = _.findIndex(data.rowVals, function (x) {
						return _.isEqual(x, rowVal);
					});
					assert.notEqual(rowValIndex, -1, tag2 + ': find row val index (' + rowValIndex + ')');
					assert.equal(data.data[rowValIndex].length, len, tag2 + ': group contains right number of rows');
				}
				return next();
			});
		}, done);
	});
});
		</script>

		<div id="qunit-fixture"></div>
