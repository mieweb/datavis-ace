		<script>
$(document).ready(function () {
	MIE.DEBUGGING = true;
	var source = new MIE.WC_DataVis.Source({
		type: 'http',
		url: 'random-500.json'
	});
	var view = new MIE.WC_DataVis.View(source);

	var sortInfo = [
		['string1', '-odont', 'yep', 'random dictionary word'],
		['int1', 0, 99, 'integer (number → number)'],
		['int2', '0', '99', 'integer (string → number)'],
		['int3', '0', '99', 'integer (string → numeral)'],
		['float1', 0.18967515847993177, 98.67511340850992, 'float (number → number)'],
		['float2', "0.08252160258047236", "98.96195093800117", 'float (string → number)'],
		['float3', "0.149", "98.82", 'float (string → numeral)'],
		['currency1', 2.39, 9970.60, 'currency (number : currency → number)'],
		['currency2', '0.89', '9,996.39', 'currency (string : currency → number)'],
		['currency3', '$55.17', '$9,984.45', 'currency (string : currency → numeral)'],
		['currency4', '$17.94', '$9969.98', 'currency (string : string → numeral)'],
		['date1', '1900-09-25', '2099-10-08', 'date (string → string)'],
		['date2', 'Feb 19, 1900', 'Nov 21, 2099', 'date (string → moment)'],
		['date3', '04/20/69', '10/26/68', 'date (string → moment)']
	];

	var groupInfo = [
		['string1', 0],
		['int1', 0],
		['int2', 0],
		['int3', 0],
		['float1', 0],
		['float2', 0],
		['float3', 0],
		['currency1', 0],
		['currency2', 0],
		['currency3', 0],
		['currency4', 0],
		['date1', 0],
		['date2', 0],
		['date3', 0]
	];

	QUnit.test('Sort Test', function (assert) {
		var done = assert.async();
		(function (args, fun, done) {
			function g() {
				if (args.length === 0) {
					return done();
				}
				fun(args.shift(), g);
			};
			g();
		})(sortInfo, function (si, next) {
			console.log(si);
			var [field, min, max, info] = si;
			view.reset();
			view.setSort({ vertical: { field: field, dir: 'ASC' }});
			view.getData(function (data) {
				var cell = data.data[0].rowData[field];
				assert.equal(cell.orig || cell.value, min, info);
				view.reset();
				view.setSort({ vertical: { field: field, dir: 'DESC' }});
				view.getData(function (data) {
					var cell = data.data[0].rowData[field];
					assert.equal(cell.orig || cell.value, max, info);
					return next();
				});
			});
		}, done);
	});
});
		</script>

	<body>
		<div id="qunit"></div>
		<div id="qunit-fixture"></div>
