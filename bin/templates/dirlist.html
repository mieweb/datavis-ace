{% whitespace all %}
<html>
  <head>
    <title>Directory Listing</title>
    <style>
      ul {
        list-style-type: none
      }
      li {
        font-family: monospace;
        white-space: pre;
      }
    </style>
  </head>
  <body>
    <h1>{{path}}</h1>
    <ul>
      {% import os %}
      <li>[dir] <a href="..">..</a></li>
      {% for f in sorted(os.listdir(path)) %}
      <li>{% if os.path.isdir(os.path.join(path, f)) %}[dir]{% else %}     {% end %} <a href="{{f}}{% if os.path.isdir(os.path.join(path, f)) %}/{% end %}">{{f}}</a></li>
      {% end %}
    </ul>
  </body>
</html>
