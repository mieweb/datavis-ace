name: Publish Docs

on:
  push:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout DataVis Repository
      uses: actions/checkout@v4
      with:
        lfs: true
        submodules: recursive
        ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Build docs in container
      uses: ./.github/actions/container
      with:
        task: build-docs

    - name: Publish docs
      run: make docs-publish
