name: Publish Examples

on:
  push:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: make setup

    - name: Build DataVis
      run: make datavis

    - name: Build tests
      run: make tests

    - name: Publish examples
      run: make tests-publish
