name: Publish Examples

on:
  push:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout DataVis Repository
      uses: actions/checkout@v4
      with:
        lfs: true
        submodules: recursive
        ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Install dependencies
      run: make setup

    - name: Build DataVis
      run: make datavis

    - name: Build tests
      run: make tests

    - name: Publish examples
      run: make tests-publish
